name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - "docs/**"

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook
        run: |
          mkdir -p $HOME/.local/bin
          MDBOOK_URL=$(curl -sSL https://api.github.com/repos/rust-lang/mdBook/releases/latest | jq -r '.assets[] | select(.name | test("x86_64-unknown-linux-gnu.tar.gz$")) | .browser_download_url')
          curl -sSL "$MDBOOK_URL" | tar -xz -C $HOME/.local/bin
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install mdbook-mermaid
        run: |
          MERMAID_URL=$(curl -sSL https://api.github.com/repos/badboy/mdbook-mermaid/releases/latest | jq -r '.assets[] | select(.name | test("x86_64-unknown-linux-gnu.tar.gz$")) | .browser_download_url')
          curl -sSL "$MERMAID_URL" | tar -xz -C $HOME/.local/bin

      - name: Install Mermaid support
        run: mdbook-mermaid install docs

      - name: Build documentation
        working-directory: docs
        run: mdbook build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book

  deploy:
    environment:
      name: github-pages
      url: ${{ github.pages.url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
